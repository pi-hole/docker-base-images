name: ftl-build builds
on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    # 1:30am UTC every Sunday, has no particular significance
    - cron: "30 1 * * 0"

env:
  DOCKER_REGISTRY_IMAGE: ${{ secrets.DOCKERHUB_NAMESPACE }}/ftl-build
  GITHUB_REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/ftl-build

permissions:
  contents: read

jobs:
  smoke-tests:
    if: |
      github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository)
      || github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || github.event_name == 'release'

    outputs:
      DO_DEPLOY: ${{ steps.variables.outputs.DO_DEPLOY }}
      DOCKER_REGISTRY_IMAGE: ${{ env.DOCKER_REGISTRY_IMAGE }}
      GITHUB_REGISTRY_IMAGE: ${{ env.GITHUB_REGISTRY_IMAGE }}
    runs-on: ubuntu-latest
    steps:
      -
        name: "Calculate required variables"
        id: variables
        run: |
          echo "DO_DEPLOY=${{ (github.event_name == 'release' || (github.event_name != 'pull_request' && github.ref != 'refs/heads/master')) && secrets.DOCKERHUB_PASS != '' && github.actor != 'dependabot[bot]' }}" >> $GITHUB_OUTPUT

      # FIXME: can't use env object in reusable workflow inputs: https://github.com/orgs/community/discussions/26671
      -
        name: "Expose registry variables for reusable workflow"
        run: echo "Exposing env vars for reusable workflow"

  build-and-test:
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 #v1.12.0
    needs:
      - smoke-tests
    permissions:
      contents: read # same as global permissions
      id-token: write # sign the GHA cache; build-and-push (which also has id-token) requires signed cache entries and rebuilds from scratch without this
    with:
      setup-qemu: true
      cache: true
      cache-scope: build
      cache-mode: max
      context: ftl-build
      fail-fast: true
      output: image
      target: test
      platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64,linux/riscv64
      push: false
      meta-images: |
        ${{ needs.smoke-tests.outputs.DOCKER_REGISTRY_IMAGE }}
        ${{ needs.smoke-tests.outputs.GITHUB_REGISTRY_IMAGE }}

  build-and-push:
    if: needs.smoke-tests.outputs.DO_DEPLOY == 'true'
    needs:  [smoke-tests, build-and-test]
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 #v1.12.0
    permissions:
      contents: read # same as global permissions
      id-token: write # for signing attestation(s) with GitHub OIDC Token
      packages: write # required to push to GHCR
    with:
      setup-qemu: true
      cache: true
      cache-scope: build
      cache-mode: max
      context: ftl-build
      fail-fast: true
      output: image
      target: build
      platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm/v7,linux/arm64,linux/riscv64
      push: true
      set-meta-labels: true
      meta-images: |
        ${{ needs.smoke-tests.outputs.DOCKER_REGISTRY_IMAGE }}
        ${{ needs.smoke-tests.outputs.GITHUB_REGISTRY_IMAGE }}
      # master never reaches build-and-push (see DO_DEPLOY), so no nightly tag is needed:
      # branch pushes get tagged with the branch name, releases get the tag name
      meta-tags: |
            type=ref,event=branch
            type=ref,event=tag
      meta-flavor: |
        latest=${{ startsWith(github.ref, 'refs/tags/') }}
      # FIXME: GHCR does not support the referrers API and spams the registry with sha-tagged images when cosigned: https://github.com/docker/github-builder/issues/109
      sign: false
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASS }}
        - registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
